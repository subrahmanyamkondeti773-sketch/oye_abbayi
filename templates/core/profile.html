{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}My Profile - Oye Abbayi{% endblock %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-lg-6">
        <div class="card border-0 rounded-5 shadow-sm p-5" style="background: white;">
            <div class="text-center mb-5">
                <div class="bg-success bg-opacity-10 rounded-circle d-inline-flex p-3 mb-3">
                    <i class="fas fa-user-edit text-success fs-2"></i>
                </div>
                <h2 class="fw-bold">Your Profile</h2>
                <p class="text-muted">Manage your personal information and delivery details.</p>
            </div>

            <form method="post" class="needs-validation">
                {% csrf_token %}
                <div class="row g-3">
                    <div class="col-md-6">
                        <div class="form-floating mb-3">
                            <input type="text" name="first_name" class="form-control rounded-4 border-0 bg-light" id="fName" placeholder="First Name" value="{{ request.user.first_name }}">
                            <label for="fName">First Name</label>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-floating mb-3">
                            <input type="text" name="last_name" class="form-control rounded-4 border-0 bg-light" id="lName" placeholder="Last Name" value="{{ request.user.last_name }}">
                            <label for="lName">Last Name</label>
                        </div>
                    </div>
                </div>

                <div class="form-floating mb-3">
                    <input type="email" name="email" class="form-control rounded-4 border-0 bg-light" id="email" placeholder="Email" value="{{ request.user.email }}">
                    <label for="email">Email Address</label>
                </div>

                <div class="form-floating mb-3">
                    <input type="text" name="phone_number" class="form-control rounded-4 border-0 bg-light" id="phone" placeholder="Phone Number" value="{{ profile.phone_number }}">
                    <label for="phone">Phone Number</label>
                </div>

                <div class="form-floating mb-3">
                    <textarea name="address" class="form-control rounded-4 border-0 bg-light" id="address" placeholder="Delivery Address" style="height: 120px;">{{ profile.address }}</textarea>
                    <label for="address">Delivery Address</label>
                </div>

                <div class="form-floating mb-4">
                    <input type="text" name="pin_code" class="form-control rounded-4 border-0 bg-light" id="pincode" placeholder="Pincode" value="{{ profile.pin_code }}">
                    <label for="pincode">Pincode</label>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-grocery btn-lg rounded-pill shadow py-3 fw-bold">
                        <i class="fas fa-save me-2"></i> Update Profile
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
